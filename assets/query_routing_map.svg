<svg width="680" viewBox="0 0 680 1140" role="img" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif">
<title>MTG RAG クエリの行先マップ</title>
<desc>ユーザーのクエリが LLM ルーターと Python 辞書で構造化され、SQL コンパイラを経て、構造化オンリー直行路またはハイブリッド経路（4腕検索、RRF 融合、reranker）で top-k 回答に至る流れ図。紫は LLM と意味検索（曖昧担当）、緑は Python と SQL（決定的担当）。</desc>
